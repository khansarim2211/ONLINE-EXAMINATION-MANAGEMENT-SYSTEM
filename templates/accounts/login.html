{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 2rem;">
    <div class="glass-panel"
        style="max-width: 420px; width: 100%; padding: 3.5rem; position: relative; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.08);">

        <!-- Subtle Decoration -->
        <div
            style="position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: #6366f1; color: white; padding: 0.5rem 1.5rem; border-radius: 50px; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);">
            Secure Portal
        </div>

        <div style="text-align: center; margin-bottom: 2.5rem;">
            <h2
                style="font-size: 2.2rem; font-weight: 900; color: #1e293b; margin-bottom: 0.5rem; letter-spacing: -1.5px;">
                Welcome Back</h2>
            <p style="color: #64748b; font-size: 0.95rem; font-weight: 500;">Enter your credentials to access the
                platform.</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-error"
            style="font-size: 0.85rem; border-radius: 15px; margin-bottom: 2rem; padding: 1rem;">
            <i class="fa-solid fa-circle-exclamation"></i> Invalid username or password details.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label
                    style="color: #475569; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; display: block;">Username</label>
                {{ form.username }}
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label
                    style="display: flex; justify-content: space-between; align-items: center; color: #475569; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem;">
                    Access Password
                    <a href="{% url 'password_reset' %}"
                        style="font-size: 0.75rem; font-weight: 800; color: #6366f1; text-decoration: none;">Reset?</a>
                </label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn"
                style="width: 100%; background: linear-gradient(135deg, #4f46e5, #4338ca); color: white; padding: 1.2rem; border-radius: 18px; font-size: 1.1rem; font-weight: 800; border: none; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);">
                Sign In instantly <i class="fa-solid fa-arrow-right-to-bracket"
                    style="margin-left: 0.5rem; opacity: 0.7;"></i>
            </button>
            <input type="hidden" name="next" value="{{ next }}" />
        </form>

        <div style="margin-top: 2.5rem; text-align: center; border-top: 1.5px solid #f8fafc; padding-top: 1.5rem;">
            <p style="color: #94a3b8; font-size: 0.9rem; font-weight: 500;">
                New to Examify? <a href="{% url 'register' %}"
                    style="color: #6366f1; font-weight: 800; text-decoration: none;">Create Account</a>
            </p>
        </div>
    </div>
</div>

<style>
    .form-group input {
        border: 2px solid #f1f5f9 !important;
        background: #f8fafc !important;
        border-radius: 14px !important;
        padding: 1rem !important;
        font-weight: 600 !important;
        font-size: 0.95rem !important;
    }

    .form-group input:focus {
        border-color: #6366f1 !important;
        background: white !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1) !important;
    }
</style>
{% endblock %}
